# Server
server.port=3000
server.servlet.context-path=/api/msf

# H2 File Database
spring.datasource.url=jdbc:h2:file:${H2_DATABASE_PATH:/data/aretedb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA – schema managed by DatabaseConfig, not Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# H2 Web Console (useful during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true

# Offer pricing (random monthly premium between min and max EUR, annual = monthly * 12 * discount)
offer.price.min.monthly=${OFFER_PRICE_MIN_MONTHLY:75}
offer.price.max.monthly=${OFFER_PRICE_MAX_MONTHLY:100}
offer.price.annual.discount=${OFFER_PRICE_ANNUAL_DISCOUNT:0.85}

# AI Model (Azure AI Foundry – Phi-4-reasoning-1)
model.api.url=${MODEL_API_URL:}
model.api.key=${MODEL_API_KEY:}
model.name=${MODEL_NAME:Phi-4-reasoning-1}
model.temperature=${MODEL_TEMPERATURE:0.8}
model.max.tokens=${MODEL_MAX_TOKENS:2048}
model.system.prompt=${MODEL_SYSTEM_PROMPT:You are a French health insurance pricing expert. Based on the subscriber profile provided, calculate a monthly and annual premium in EUR. Premium is in the range of 75 to 150 EUR per month. Annual premium is discounted by 15%. Respond with ONLY a valid JSON object in this exact format: {"monthlyPremium": <number>, "annualPremium": <number>, "error": "message"}. No other text.}
model.user.prompt.template=${MODEL_USER_PROMPT_TEMPLATE:Calculate the health insurance premium for a subscriber with the following profile: professional status={profile}, age={age}, postcode={postcode}, covers partner={coverPartner}, covers children={coverChildren}, number of children={numberOfChildren}, optical needs={opticalNeeds}, dental needs={dentalNeeds}, alternative medicine usage={alternativeMedicine}, hospitalisation preference={hospitalisationPreference}, doctor access preference={doctorChoice}.}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
