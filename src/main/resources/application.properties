# Server
server.port=3000
server.servlet.context-path=/api/msf

# H2 File Database
spring.datasource.url=jdbc:h2:file:${H2_DATABASE_PATH:/data/aretedb};DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA – schema managed by DatabaseConfig, not Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# H2 Web Console (useful during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.arete.webapi=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
